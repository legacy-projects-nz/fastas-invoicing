<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FASTAS Invoicing</title>
<!-- start fetching the voice widget code as early as possible -->
<link rel="preconnect" href="https://unpkg.com" crossorigin>
<link rel="dns-prefetch" href="https://unpkg.com">
<link rel="preload" as="script" href="https://unpkg.com/@elevenlabs/convai-widget-embed">
<script src="https://unpkg.com/@elevenlabs/convai-widget-embed" async type="text/javascript"></script>
<style>
  :root{
    --ink:#101828; --muted:#667085; --line:#e6e9ef;
    --green:#25D366; --brand:#2563eb; --amber:#d97706; --red:#dc2626;
    --bg1:#f7f9fc; --bg2:#eef2f8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);
    background:linear-gradient(160deg,var(--bg1) 0%,var(--bg2) 100%);
    min-height:100vh;
    display:flex;flex-direction:column;align-items:center;
  }
  header{text-align:center;padding:42px 24px 4px;}
  .brand{display:inline-flex;align-items:center;gap:12px;margin-bottom:16px;}
  .brand-mark{
    width:46px;height:46px;border-radius:12px;
    background:linear-gradient(135deg,var(--brand),#7c3aed);
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:800;font-size:20px;letter-spacing:.5px;
    box-shadow:0 8px 20px rgba(37,99,235,.35);
  }
  .brand-name{font-size:22px;font-weight:800;letter-spacing:.5px;}
  h1{margin:0;font-size:42px;line-height:1.1;font-weight:800;letter-spacing:-1px;}
  h1 span{color:var(--brand);}
  .subtitle{margin:14px auto 0;max-width:520px;font-size:17px;line-height:1.6;color:var(--muted);}

  /* session bar — sits at the bottom of the page */
  .userbar{display:none;align-items:center;justify-content:center;gap:10px;font-size:13px;color:var(--muted);margin-top:auto;padding:10px 16px 0;flex-wrap:wrap;}
  .userbar .pill{background:#fff;border:1px solid var(--line);border-radius:999px;padding:6px 12px;box-shadow:0 4px 12px rgba(16,24,40,.06);}
  .userbar .role{font-weight:700;color:var(--brand);text-transform:capitalize;}
  .userbar button{border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 12px;cursor:pointer;font-size:13px;color:var(--ink);}
  .userbar button:hover{background:#f3f4f6;}

  .cards{
    display:flex;flex-wrap:wrap;gap:14px;justify-content:center;
    padding:22px 24px 40px;width:100%;max-width:430px;
  }
  /* each card IS the button: icon centred, title under it, two per row */
  .card{
    position:relative;background:#fff;border:1px solid var(--line);
    border-radius:20px;padding:20px 12px;cursor:pointer;
    width:calc(50% - 7px);min-height:142px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
    box-shadow:0 10px 30px rgba(16,24,40,.08);
    user-select:none;-webkit-tap-highlight-color:transparent;
    text-decoration:none;color:var(--ink);text-align:center;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .card:hover{transform:translateY(-2px);box-shadow:0 14px 34px rgba(16,24,40,.14);}
  /* hue pairing: each row shares a colour family so related tools read as a group */
  .card.t-blue{background:linear-gradient(180deg,#ffffff,#f5f8ff);border-color:#dbe5f8;}
  .card.t-green{background:linear-gradient(180deg,#ffffff,#f3faf5);border-color:#d6ecdc;}
  .card.t-grey{background:linear-gradient(180deg,#ffffff,#f4f5f7);border-color:#dfe3e8;}
  .cardbadge{position:absolute;top:-8px;right:-8px;min-width:26px;height:26px;padding:0 7px;border-radius:999px;background:var(--red);color:#fff;font-size:13px;font-weight:800;display:none;align-items:center;justify-content:center;box-shadow:0 4px 10px rgba(220,38,38,.4);z-index:2;}
  .icon{width:64px;height:64px;border-radius:18px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .icon.voice{background:linear-gradient(135deg,#1e40af,#3b82f6);box-shadow:0 8px 18px rgba(37,99,235,.45);}
  .icon.wa{background:linear-gradient(135deg,#14532d,#16a34a);box-shadow:0 8px 18px rgba(22,101,52,.45);}
  .icon.price{background:linear-gradient(135deg,#166534,#22c55e);box-shadow:0 8px 18px rgba(22,101,52,.45);}
  .icon.train{background:linear-gradient(135deg,#1d4ed8,#60a5fa);box-shadow:0 8px 18px rgba(37,99,235,.45);}
  .icon.check{background:linear-gradient(135deg,#334155,#64748b);box-shadow:0 8px 18px rgba(51,65,85,.45);}
  .icon svg{width:32px;height:32px;fill:#fff;}
  .card h2{margin:0;font-size:15px;font-weight:800;text-align:center;letter-spacing:-.2px;}
  .icon.crm{background:linear-gradient(135deg,#1f2937,#4b5563);box-shadow:0 8px 18px rgba(31,41,55,.45);}

  .btn{
    display:inline-flex;align-items:center;gap:10px;cursor:pointer;border:none;margin-top:auto;
    color:#fff;font-weight:600;font-size:15px;padding:13px 22px;border-radius:999px;text-decoration:none;
    transition:transform .15s ease,box-shadow .15s ease;
  }
  .btn:hover{transform:translateY(-2px);}
  .btn svg{width:20px;height:20px;fill:#fff;}
  .btn.voice{background:linear-gradient(135deg,#2563eb,#7c3aed);box-shadow:0 6px 18px rgba(37,99,235,.35);}
  .btn.wa{background:var(--green);color:#fff!important;box-shadow:0 6px 18px rgba(37,211,102,.35);}
  .btn.price{background:linear-gradient(135deg,#d97706,#f59e0b);box-shadow:0 6px 18px rgba(217,119,6,.35);}
  .btn.train{background:linear-gradient(135deg,#dc2626,#f43f5e);box-shadow:0 6px 18px rgba(220,38,38,.35);}

  elevenlabs-convai{display:none !important;}
  elevenlabs-convai.fastas-show{
    display:block !important;
    position:fixed !important;left:0 !important;right:0 !important;width:100vw !important;
    bottom:20px !important;transform:scale(0.72) !important;transform-origin:bottom center !important;
    z-index:99999 !important;opacity:1 !important;pointer-events:auto !important;
  }

  footer{padding:12px 16px 18px;font-size:13px;color:#98a2b3;}
  /* compact layout: all six tiles + header + session bar fit a standard phone screen */
  @media (max-width:600px){
    header{padding:14px 20px 0;}
    .brand{display:none;}
    h1{font-size:28px;}
    .subtitle{margin-top:6px;font-size:15px;}
    .cards{padding:14px 16px 8px;gap:10px;}
    .card{min-height:104px;padding:12px 8px;gap:8px;width:calc(50% - 5px);}
    .icon{width:46px;height:46px;border-radius:13px;}
    .icon svg{width:24px;height:24px;}
    .card h2{font-size:13.5px;}
    footer{padding:8px 12px 12px;}
  }

  /* ===== LOGIN GATE (Supabase Auth) ===== */
  #gate{position:fixed;inset:0;z-index:200000;background:linear-gradient(160deg,var(--bg1),var(--bg2));display:flex;align-items:center;justify-content:center;padding:24px;}
  #gate.hidden{display:none;}
  .gate-card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:34px 30px;width:100%;max-width:380px;text-align:center;box-shadow:0 12px 34px rgba(16,24,40,.12);}
  .gate-card .brand-mark{margin:0 auto 18px;}
  .gate-card h2{margin:0 0 6px;font-size:22px;font-weight:800;letter-spacing:-.3px;}
  .gate-card p{margin:0 0 20px;font-size:14px;line-height:1.5;color:var(--muted);}
  .gate-card input{width:100%;padding:13px 14px;font-size:16px;border:1px solid var(--line);border-radius:12px;margin-bottom:12px;outline:none;}
  .gate-card input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(37,99,235,.15);}
  .gate-card button.primary{width:100%;padding:13px;font-size:16px;font-weight:700;color:#fff;border:none;border-radius:12px;cursor:pointer;background:linear-gradient(135deg,#2563eb,#7c3aed);box-shadow:0 6px 18px rgba(37,99,235,.35);transition:transform .15s ease;}
  .gate-card button.primary:hover{transform:translateY(-1px);}
  .gate-card button.primary:disabled{opacity:.6;cursor:default;transform:none;}
  .gate-msg{font-size:13px;min-height:18px;margin:2px 0 10px;}
  .gate-msg.err{color:#d92d20;}
  .gate-msg.ok{color:#067647;}
  .gate-toggle{margin-top:16px;font-size:13px;color:var(--muted);}
  .gate-toggle a{color:var(--brand);cursor:pointer;font-weight:600;text-decoration:none;}
  body.locked{overflow:hidden;}
  .hide{display:none!important;}
</style>
</head>
<body class="locked">

  <!-- ===================== LOGIN (Supabase Auth) ===================== -->
  <div id="gate">
    <form class="gate-card" id="gateForm" autocomplete="on">
      <div class="brand-mark">FA</div>
      <h2 id="gateTitle">FASTAS Invoicing</h2>
      <p id="gateSub">Sign in to continue.</p>
      <div class="gate-msg" id="gateMsg"></div>
      <input type="email" id="gateEmail" placeholder="Email" autocomplete="email" required>
      <input type="password" id="gatePass" placeholder="Password" autocomplete="current-password" required>
      <button type="submit" class="primary" id="gateBtn">Sign in</button>
      <div class="gate-toggle">Need an account? Ask your administrator to add you.</div>
    </form>
  </div>

  <header>
    <div class="brand">
      <div class="brand-mark">FA</div>
      <div class="brand-name">FASTAS</div>
    </div>
    <h1>FASTAS <span>Invoicing</span></h1>
    <p class="subtitle">Fast &amp; Easy as.</p>
  </header>

  <section class="cards">

    <!-- Row 1 (blue — create): Invoice Generator + Certificate Builder -->
    <div class="card t-blue" id="startcall" role="button" aria-label="Start an invoice call">
      <div class="icon voice">
        <svg viewBox="0 0 24 24"><path d="M12 15a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V22h2v-3.08A7 7 0 0 0 19 12h-2z"/></svg>
      </div>
      <h2>Invoice Generator</h2>
    </div>

    <a class="card t-blue" href="training.html">
      <div class="icon train">
        <svg viewBox="0 0 24 24"><path d="M12 2a7 7 0 0 0-4 12.74V22l4-2 4 2v-7.26A7 7 0 0 0 12 2zm0 11a4 4 0 1 1 4-4 4 4 0 0 1-4 4z"/></svg>
      </div>
      <h2>Certificate Builder</h2>
    </a>

    <!-- Row 2 (green — money): Invoice Changes + Price Setting -->
    <a class="card t-green" id="waLink" href="https://chat.whatsapp.com/GXtz9KTTh6F4qXPUsycVc8" target="_blank" rel="noopener">
      <div class="icon wa">
        <svg viewBox="0 0 32 32"><path d="M16 .5C7.4.5.5 7.4.5 16c0 2.8.7 5.4 2 7.7L.5 31.5l8-2.1c2.2 1.2 4.8 1.9 7.5 1.9 8.6 0 15.5-6.9 15.5-15.5S24.6.5 16 .5zm0 28c-2.4 0-4.7-.6-6.7-1.8l-.5-.3-4.7 1.2 1.3-4.6-.3-.5A12.4 12.4 0 1 1 28.5 16c0 6.9-5.6 12.5-12.5 12.5zm6.9-9.4c-.4-.2-2.2-1.1-2.6-1.2-.3-.1-.6-.2-.8.2-.2.4-.9 1.2-1.1 1.4-.2.2-.4.3-.8.1-.4-.2-1.6-.6-3-1.9-1.1-1-1.9-2.2-2.1-2.6-.2-.4 0-.6.2-.8.2-.2.4-.4.5-.7.2-.2.2-.4.4-.7.1-.3 0-.5 0-.7-.1-.2-.8-2-1.1-2.7-.3-.7-.6-.6-.8-.6h-.7c-.2 0-.6.1-.9.4-.3.4-1.2 1.2-1.2 2.9 0 1.7 1.2 3.3 1.4 3.6.2.2 2.5 3.8 6 5.3.8.4 1.5.6 2 .8.8.3 1.6.2 2.2.1.7-.1 2.2-.9 2.5-1.7.3-.9.3-1.6.2-1.7-.1-.2-.3-.3-.7-.5z"/></svg>
      </div>
      <h2>Invoice Changes</h2>
    </a>

    <a class="card t-green" href="pricing.html">
      <div class="icon price">
        <svg viewBox="0 0 24 24"><path d="M3 6a2 2 0 0 1 2-2h9.2a2 2 0 0 1 1.41.59l4.8 4.8a2 2 0 0 1 0 2.82l-7.8 7.8a2 2 0 0 1-2.82 0l-6.6-6.6A2 2 0 0 1 3 11.8V6zm4 1.5A1.5 1.5 0 1 0 7 10.5 1.5 1.5 0 0 0 7 7.5z"/></svg>
      </div>
      <h2>Price Setting</h2>
    </a>

    <!-- Row 3 (dark grey — review & external): Inv/Rep Checker + OnePageCRM -->
    <a class="card t-grey" id="checkerCard" href="checker.html" style="display:none;">
      <span class="cardbadge" id="checkBadge">0</span>
      <div class="icon check">
        <svg viewBox="0 0 24 24"><path d="M9 16.2 4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4z"/></svg>
      </div>
      <h2>Inv/Rep Checker</h2>
    </a>

    <a class="card t-grey" href="https://app.onepagecrm.com" target="_blank" rel="noopener">
      <div class="icon crm">
        <svg viewBox="0 0 24 24"><path d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4zm0 2c-3.3 0-8 1.7-8 5v3h16v-3c0-3.3-4.7-5-8-5z"/></svg>
      </div>
      <h2>OnePageCRM</h2>
    </a>

  </section>

  <p class="subtitle" id="adminLink" style="margin:0 0 10px;display:none;">
    <a href="admin.html" style="color:var(--brand);font-weight:700;text-decoration:none;font-size:15px;">⚙ Admin portal →</a>
  </p>

  <!-- ===================== SESSION BAR (bottom) ===================== -->
  <div class="userbar" id="userbar">
    <span class="pill"><span id="ubEmail"></span> · <span class="role" id="ubRole"></span></span>
    <button id="signout">Sign out</button>
  </div>

  <footer>© FASTAS Invoicing</footer>

  <!-- floating call UI -->
  <elevenlabs-convai agent-id="agent_01jyqjybh6fgxvw9tnv2qs7d9n"></elevenlabs-convai>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    // ===== FASTAS Supabase config =====
    const SUPABASE_URL = 'https://ecgvkifvlrcfrnqbades.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_qGgoGsfKwLELehUzbC25Bw_u_rwVwk2';
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);
    window.fastasSB = sb;

    const gate=document.getElementById('gate');
    const form=document.getElementById('gateForm');
    const email=document.getElementById('gateEmail');
    const pass=document.getElementById('gatePass');
    const msg=document.getElementById('gateMsg');
    const btn=document.getElementById('gateBtn');

    function setMsg(t,kind){ msg.textContent=t||''; msg.className='gate-msg '+(kind||''); }
    function unlock(){ gate.classList.add('hidden'); document.body.classList.remove('locked'); }
    function lock(){ gate.classList.remove('hidden'); document.body.classList.add('locked'); }

    form.addEventListener('submit',async(e)=>{
      e.preventDefault(); setMsg(''); btn.disabled=true;
      try{
        const {error}=await sb.auth.signInWithPassword({email:email.value.trim(),password:pass.value});
        if(error) throw error;
      }catch(err){
        setMsg(err.message||'Could not sign in.','err'); btn.disabled=false; return;
      }
      btn.disabled=false;
    });

    // session bar
    const userbar=document.getElementById('userbar');
    const ubEmail=document.getElementById('ubEmail');
    const ubRole=document.getElementById('ubRole');
    const adminLink=document.getElementById('adminLink');
    document.getElementById('signout').addEventListener('click',async()=>{ await sb.auth.signOut(); location.reload(); });

    const checkerCard=document.getElementById('checkerCard');
    const checkBadge=document.getElementById('checkBadge');
    async function applySession(session){
      if(!session){ lock(); userbar.style.display='none'; adminLink.style.display='none'; checkerCard.style.display='none'; return; }
      unlock(); userbar.style.display='flex'; ubEmail.textContent=session.user.email;
      const {data:prof}=await sb.from('profiles').select('role,whatsapp_link').eq('id',session.user.id).single();
      const role=prof?.role||'licensee';
      // each licensee has their own WhatsApp group — set by the admin in the portal
      if(prof?.whatsapp_link) document.getElementById('waLink').href=prof.whatsapp_link;
      ubRole.textContent=role;
      adminLink.style.display = role==='admin' ? 'block' : 'none';
      // Inv/Rep Checker — shown to licensees; badge counts items awaiting their approval
      if(role==='licensee'){
        checkerCard.style.display='flex';
        const {count}=await sb.from('documents').select('id',{count:'exact',head:true}).eq('licensee_id',session.user.id).eq('status','pending');
        if(count&&count>0){ checkBadge.textContent=count; checkBadge.style.display='flex'; } else { checkBadge.style.display='none'; }
      } else { checkerCard.style.display='none'; }
    }
    const {data:{session}}=await sb.auth.getSession();
    await applySession(session);
    sb.auth.onAuthStateChange((_e,s)=>applySession(s));
  </script>


  <!-- voice widget controller (unchanged behaviour) -->
  <script>
    (function(){
      var host=document.querySelector('elevenlabs-convai');
      var closeBtn=document.createElement('button');
      closeBtn.id='fastasClose'; closeBtn.setAttribute('aria-label','Close'); closeBtn.textContent='✕';
      // top-right corner so it can NEVER overlap the widget's centered Accept button or bottom call controls
      closeBtn.style.cssText='position:fixed;top:16px;right:16px;z-index:100001;width:36px;height:36px;border-radius:50%;border:1px solid #e0e0e0;background:#fff;color:#333;font-size:16px;line-height:1;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.2);display:none;align-items:center;justify-content:center;padding:0;';
      document.body.appendChild(closeBtn);
      closeBtn.addEventListener('click',function(){
        try{ host.shadowRoot.querySelectorAll('button').forEach(function(b){ var l=(b.getAttribute('aria-label')||b.textContent||'').toLowerCase(); if(l.indexOf('end')>-1||l.indexOf('hang')>-1) b.click(); }); }catch(e){}
        location.reload();
      });
      function injectCenter(){
        if(host&&host.shadowRoot&&!host.shadowRoot.getElementById('fastas-center')){
          var st=document.createElement('style');st.id='fastas-center';
          st.textContent='.overlay{align-items:center !important; justify-content:flex-end !important;}';
          host.shadowRoot.appendChild(st);return true;
        } return false;
      }
      var t=0,iv=setInterval(function(){ if(injectCenter()||t++>40) clearInterval(iv); },150);
      // Show the ✕ ONLY while a call is genuinely active (mute / hang-up / end controls present).
      // This guarantees it never sits over the Terms "Accept" button — the Edge issue where the
      // overlay swallowed the Accept tap. When the call ends, reset to a clean landing page.
      var callWasActive=false;
      setInterval(function(){
        var active=false;
        try{ host.shadowRoot.querySelectorAll('button,[role="button"]').forEach(function(b){ var l=(b.getAttribute('aria-label')||b.textContent||'').toLowerCase(); if(l.indexOf('mute')>-1||l.indexOf('hang')>-1||l.indexOf('end call')>-1) active=true; }); }catch(e){}
        closeBtn.style.display = active ? 'flex' : 'none';
        if(active){ callWasActive=true; } else if(callWasActive){ callWasActive=false; setTimeout(function(){ location.reload(); },800); }
      },400);
      function startCall(){
        if(!host) return; host.classList.add('fastas-show'); injectCenter();
        var n=0;(function go(){ var r=host.shadowRoot; if(r){ var b=r.querySelector('button,[role="button"]'); if(b){ b.click(); return; } } if(n++<12) setTimeout(go,300); })();
      }
      document.addEventListener('click',function(e){ if(e.target.closest('#startcall')){ e.preventDefault(); startCall(); } });
    })();
  </script>
</body>
</html>
