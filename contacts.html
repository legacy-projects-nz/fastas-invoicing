<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FASTAS · Contacts</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%232563eb'/%3E%3Cstop offset='1' stop-color='%231d4ed8'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Ctext x='32' y='43' font-family='Arial' font-size='30' font-weight='800' fill='white' text-anchor='middle'%3EFA%3C/text%3E%3C/svg%3E">
<style>
  :root{--ink:#101828;--muted:#667085;--line:#e6e9ef;--brand:#2563eb;--green:#4f46e5;--red:#475569;--bg1:#f7f9fc;--bg2:#eef2f8;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:linear-gradient(160deg,var(--bg1),var(--bg2));min-height:100vh;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-mark{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--brand),#1d4ed8);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;}
  .topbar a{color:var(--brand);text-decoration:none;font-weight:600;font-size:14px;margin-left:14px;}
  .topbar .who{font-size:13px;color:var(--muted);}
  .wrap{max-width:680px;margin:0 auto;padding:18px 16px 60px;}
  h1{font-size:22px;margin:4px 0 12px;}
  .search{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:12px;font-size:16px;outline:none;margin-bottom:14px;}
  .search:focus{border-color:var(--brand);}
  .c{background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px 15px;margin-bottom:10px;box-shadow:0 4px 12px rgba(16,24,40,.04);}
  .c .nm{font-weight:700;font-size:16px;}
  .c .who2{color:var(--muted);font-size:13px;margin-top:1px;}
  .acts{display:flex;gap:10px;margin-top:11px;}
  .acts a{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;text-decoration:none;font-weight:700;font-size:14px;border-radius:11px;padding:11px;}
  .acts a.call{background:#eef2ff;color:var(--green);border:1px solid #c7d2fe;}
  .acts a.mail{background:#eff6ff;color:var(--brand);border:1px solid #dbe7ff;}
  .acts a.off{background:#f4f5f7;color:#9aa4b2;border:1px solid var(--line);pointer-events:none;}
  .acts a.arch{background:#f1f5f9;color:var(--ink);border:1px solid var(--line);}
  .empty{color:var(--muted);text-align:center;padding:50px 0;}
  .modal{display:none;position:fixed;inset:0;z-index:5000;background:rgba(16,24,40,.45);align-items:center;justify-content:center;padding:18px;}
  .modal.show{display:flex;}
  .mcard{background:#fff;border-radius:16px;padding:20px;width:100%;max-width:460px;box-shadow:0 16px 44px rgba(16,24,40,.25);}
  .mcard h3{margin:0 0 4px;font-size:18px;}
  .mcard .mh{font-size:12.5px;color:var(--muted);margin:0 0 14px;}
  .mcard label{display:block;font-size:12px;font-weight:700;color:#344054;margin:10px 0 5px;}
  .mcard input,.mcard textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit;}
  .mcard textarea{min-height:120px;resize:vertical;}
  .mact{display:flex;justify-content:space-between;align-items:center;margin-top:16px;gap:10px;}
  .mact .send{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-weight:700;cursor:pointer;}
  .mact .send:disabled{opacity:.5;cursor:default;}
  .mact .cancel{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 16px;cursor:pointer;}
  .cmsg{font-size:13px;min-height:16px;} .cmsg.ok{color:var(--green);} .cmsg.err{color:var(--red);}
</style>
</head>
<body>
  <div class="topbar">
    <div class="brand"><div class="brand-mark">FA</div><b>Contacts</b></div>
    <div style="display:flex;align-items:center;gap:16px;"><span class="who" id="who"></span><a href="index.html">← Main menu</a><a href="#" id="signoutLink" style="color:#475569;">Sign out</a></div>
  </div>
  <div class="wrap">
    <h1>Business contacts</h1>
    <input class="search" id="search" placeholder="Search business or contact…">
    <div id="host"><div class="empty">Loading…</div></div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    const SUPABASE_URL='https://ecgvkifvlrcfrnqbades.supabase.co';
    const SUPABASE_KEY='sb_publishable_qGgoGsfKwLELehUzbC25Bw_u_rwVwk2';
    const sb=createClient(SUPABASE_URL,SUPABASE_KEY);

    const {data:{session}}=await sb.auth.getSession();
    if(!session){ location.replace('index.html'); throw new Error('not signed in'); }
    document.getElementById('signoutLink').addEventListener('click',async(e)=>{ e.preventDefault();
      try{ await sb.auth.signOut({scope:'local'}); }catch(_){}
      try{ Object.keys(localStorage).forEach(k=>{ if(k.indexOf('sb-')===0) localStorage.removeItem(k); }); }catch(_){}
      location.href='index.html'; });
    const {data:prof}=await sb.from('profiles').select('role,full_name,features').eq('id',session.user.id).single();
    if((prof?.role||'licensee')==='licensee' && prof?.features?.contacts===false){ location.href='index.html'; }
    document.getElementById('who').textContent=(prof?.full_name||session.user.email)+' — '+(prof?.role||'licensee');

    let list=[];
    const host=document.getElementById('host'), search=document.getElementById('search');
    async function load(){
      const {data,error}=await sb.from('businesses').select('name,contact_email,first_name,last_name,phone').order('name');
      if(error){ host.innerHTML='<div class="empty">'+error.message+'</div>'; return; }
      list=data||[]; render();
    }
    function render(){
      const q=(search.value||'').toLowerCase();
      const rows=list.filter(b=>!q || b.name.toLowerCase().includes(q) || [b.first_name,b.last_name,b.contact_email,b.phone].filter(Boolean).join(' ').toLowerCase().includes(q));
      if(!rows.length){ host.innerHTML='<div class="empty">No contacts'+(q?' match':' yet')+'.</div>'; return; }
      host.innerHTML=rows.map(b=>{
        const who=[b.first_name,b.last_name].filter(Boolean).join(' ');
        const tel=(b.phone||'').replace(/[^+\d]/g,'');
        const call=tel?`<a class="call" href="tel:${tel}">📞 Call</a>`:`<a class="call off">📞 No phone</a>`;
        const mail=b.contact_email?`<a class="mail" href="#" data-email="${b.contact_email}">✉ Email</a>`:`<a class="mail off">✉ No email</a>`;
        const arch=`<a class="arch" href="archive.html?biz=${encodeURIComponent(b.name)}&email=${encodeURIComponent(b.contact_email||'')}">📁 Files</a>`;
        return `<div class="c"><div class="nm">${b.name}</div>${who||b.phone||b.contact_email?`<div class="who2">${[who,b.phone,b.contact_email].filter(Boolean).join(' · ')}</div>`:''}<div class="acts">${call}${mail}${arch}</div></div>`;
      }).join('');
      host.querySelectorAll('a.mail[data-email]').forEach(a=>a.addEventListener('click',e=>{ e.preventDefault(); openCompose(a.dataset.email); }));
    }
    // ---- in-app email compose ----
    const cModal=document.getElementById('cModal');
    function openCompose(email){
      document.getElementById('cTo').value=email||'';
      document.getElementById('cSubject').value='';
      document.getElementById('cMsg').value='';
      document.getElementById('cStatus').textContent='';
      cModal.classList.add('show');
    }
    document.getElementById('cCancel').addEventListener('click',()=>cModal.classList.remove('show'));
    cModal.addEventListener('click',e=>{ if(e.target===cModal) cModal.classList.remove('show'); });
    document.getElementById('cSend').addEventListener('click',async()=>{
      const to=document.getElementById('cTo').value.trim();
      const subject=document.getElementById('cSubject').value.trim();
      const message=document.getElementById('cMsg').value.trim();
      const st=document.getElementById('cStatus'); const btn=document.getElementById('cSend');
      if(!to||!message){ st.textContent='Add a recipient and a message.'; st.className='cmsg err'; return; }
      btn.disabled=true; st.textContent='Sending…'; st.className='cmsg';
      try{
        const r=await fetch(SUPABASE_URL+'/functions/v1/send-email',{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+session.access_token},body:JSON.stringify({to,subject,message})});
        const o=await r.json().catch(()=>({})); if(!r.ok||o.error) throw new Error(o.error||'Send failed.');
        st.textContent='Sent ✓ — replies will come to '+(o.reply_to||'your inbox')+'.'; st.className='cmsg ok';
        setTimeout(()=>cModal.classList.remove('show'),1400);
      }catch(e){ st.textContent=e.message; st.className='cmsg err'; }
      btn.disabled=false;
    });
    search.addEventListener('input',render);
    load();
  
  </script>
  <div class="modal" id="cModal">
    <div class="mcard">
      <h3>Send an email</h3>
      <p class="mh">Sent from FAST AS on your behalf — when they reply it comes straight to your own inbox.</p>
      <label>To</label><input id="cTo" type="email">
      <label>Subject</label><input id="cSubject" placeholder="e.g. Your upcoming service">
      <label>Message</label><textarea id="cMsg" placeholder="Write your message…"></textarea>
      <div class="cmsg" id="cStatus"></div>
      <div class="mact"><button class="cancel" id="cCancel">Cancel</button><button class="send" id="cSend">Send</button></div>
    </div>
  </div>
</body>
</html>
