<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FASTAS · Inv/Rep Checker</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%232563eb'/%3E%3Cstop offset='1' stop-color='%231d4ed8'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Ctext x='32' y='43' font-family='Arial' font-size='30' font-weight='800' fill='white' text-anchor='middle'%3EFA%3C/text%3E%3C/svg%3E">
<style>
  :root{--ink:#101828;--muted:#667085;--line:#e6e9ef;--brand:#2563eb;--sky:#0ea5e9;--red:#475569;--ok:#4338ca;--amber:#475569;--bg1:#f7f9fc;--bg2:#eef2f8;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:linear-gradient(160deg,var(--bg1),var(--bg2));min-height:100vh;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-mark{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--sky),var(--brand));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;}
  .topbar a{color:var(--brand);text-decoration:none;font-weight:600;font-size:14px;margin-left:14px;}
  .topbar .who{font-size:13px;color:var(--muted);}
  .bar{display:flex;align-items:center;gap:12px;padding:14px 22px;flex-wrap:wrap;}
  .bar h1{font-size:20px;margin:0;flex:1;}
  .bar .tot{font-size:13px;color:var(--muted);}
  .hint{font-size:12px;color:var(--muted);padding:0 22px 8px;}
  .board{display:flex;gap:0;overflow-x:auto;padding:0 14px 16px;align-items:flex-start;-webkit-overflow-scrolling:touch;}
  .col{flex:0 0 250px;min-width:250px;display:flex;flex-direction:column;}
  .colhead{position:relative;color:#fff;padding:9px 12px 9px 18px;font-weight:700;font-size:12px;margin-right:8px;flex:0 0 auto;}
  .colhead .ct{float:right;background:rgba(255,255,255,.25);border-radius:999px;padding:0 8px;font-size:11px;}
  .colhead:after{content:'';position:absolute;top:0;right:-14px;width:0;height:0;border-top:17px solid transparent;border-bottom:17px solid transparent;border-left:14px solid currentColor;z-index:2;}
  .col:last-child .colhead:after{display:none;} .col:last-child .colhead{margin-right:0;}
  .colbody{background:#eef1f6;border:1px solid var(--line);border-top:none;margin-right:8px;padding:8px;min-height:120px;border-radius:0 0 10px 10px;}
  .col:last-child .colbody{margin-right:0;}
  .kcard{background:#fff;border:1px solid #e6e9ef;border-radius:10px;padding:11px 12px;margin-bottom:9px;box-shadow:0 2px 6px rgba(16,24,40,.06);cursor:pointer;transition:transform .12s,box-shadow .12s;}
  .kcard:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(16,24,40,.1);}
  .kcard .kt{font-weight:700;font-size:14px;}
  .kbadges{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;}
  .kb{font-size:10.5px;font-weight:700;border-radius:6px;padding:2px 7px;}
  .kb.inv{background:#eff6ff;color:var(--brand);border:1px solid #dbe7ff;}
  .kb.rep{background:#eef2ff;color:var(--ok);border:1px solid #d6dbfb;}
  .kstat{margin-top:8px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px;}
  .kstat.rev{color:#2563eb;} .kstat.chg{color:var(--red);} .kstat.app{color:var(--ok);}
  .kempty{color:#9aa4b2;font-size:12px;text-align:center;padding:14px 4px;}
  /* review modal */
  .modal{display:none;position:fixed;inset:0;z-index:5000;background:rgba(16,24,40,.45);align-items:flex-start;justify-content:center;padding:24px 16px;overflow:auto;}
  .modal.show{display:flex;}
  .mcard{background:#fff;border-radius:16px;width:100%;max-width:600px;box-shadow:0 16px 44px rgba(16,24,40,.25);margin:auto;}
  .mhead{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .mhead h3{margin:0;font-size:18px;}
  .mclose{background:none;border:none;font-size:18px;color:var(--muted);cursor:pointer;}
  .mbody{padding:14px 20px 20px;}
  .sechead{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;margin:14px 0 10px;display:flex;align-items:center;gap:8px;}
  .sechead.invoice{color:var(--brand);} .sechead.report{color:var(--ok);}
  .sechead .cnt{background:#eef2f8;color:var(--muted);border-radius:999px;padding:1px 8px;font-size:11px;}
  .none{color:var(--muted);font-size:13px;padding:2px 0 6px;}
  .docrow{border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px;}
  .dr-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap;}
  .dr-title{font-weight:700;font-size:15px;}
  .pill{font-size:11px;padding:3px 9px;border-radius:999px;font-weight:700;white-space:nowrap;}
  .pill.pending{background:#f1f5f9;color:var(--amber);} .pill.approved{background:#eef2ff;color:var(--ok);} .pill.rejected{background:#f1f5f9;color:var(--red);}
  a.dl{display:inline-flex;align-items:center;gap:6px;color:var(--brand);text-decoration:none;font-weight:600;font-size:14px;margin-top:8px;background:#eff6ff;border:1px solid #dbe7ff;border-radius:9px;padding:8px 12px;max-width:100%;}
  a.dl span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  textarea{width:100%;margin-top:10px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit;resize:vertical;min-height:54px;outline:none;}
  textarea:focus{border-color:var(--brand);}
  .actions{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;}
  button.approve,button.reject{border:none;border-radius:10px;padding:10px 16px;font-weight:700;font-size:14px;cursor:pointer;}
  button.approve{background:linear-gradient(135deg,#6366f1,#4338ca);color:#fff;}
  button.reject{background:#fff;border:1px solid #cbd5e1;color:var(--red);}
  button:disabled{opacity:.5;cursor:default;}
  .decided{font-size:13px;color:var(--muted);margin-top:8px;}
  .note-shown{margin-top:8px;background:#f8fafc;border:1px solid var(--line);border-radius:10px;padding:9px 11px;font-size:13px;}
  .msg{font-size:13px;margin-top:6px;} .msg.ok{color:var(--ok);} .msg.err{color:var(--red);}
  .empty{color:var(--muted);text-align:center;padding:50px 0;}
  @media(max-width:600px){ .col{flex:0 0 215px;min-width:215px;} }
</style>
</head>
<body>
  <div class="topbar">
    <div class="brand"><div class="brand-mark">FA</div><b>Inv/Rep Checker</b></div>
    <div style="display:flex;align-items:center;gap:16px;"><span class="who" id="who"></span><a href="index.html">← Main menu</a><a href="#" id="signoutLink" style="color:#475569;">Sign out</a></div>
  </div>
  <div class="bar">
    <h1>Invoices &amp; reports to review</h1>
    <span class="tot" id="tot"></span>
  </div>
  <p class="hint">Each business is a card. Tap a card to open its invoice &amp; reports, add a note if you'd like changes, then approve or reject each item.</p>
  <div class="board" id="board"><div class="empty">Loading…</div></div>

  <div class="modal" id="modal">
    <div class="mcard">
      <div class="mhead"><h3 id="mTitle">Business</h3><button class="mclose" id="mClose">✕</button></div>
      <div class="mbody" id="mBody"></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    const SUPABASE_URL='https://ecgvkifvlrcfrnqbades.supabase.co';
    const SUPABASE_KEY='sb_publishable_qGgoGsfKwLELehUzbC25Bw_u_rwVwk2';
    const sb=createClient(SUPABASE_URL,SUPABASE_KEY);

    const {data:{session}}=await sb.auth.getSession();
    if(!session){ location.replace('index.html'); throw new Error('not signed in'); }
    document.getElementById('signoutLink').addEventListener('click',async(e)=>{ e.preventDefault();
      try{ await sb.auth.signOut({scope:'local'}); }catch(_){}
      try{ Object.keys(localStorage).forEach(k=>{ if(k.indexOf('sb-')===0) localStorage.removeItem(k); }); }catch(_){}
      location.href='index.html'; });
    const {data:prof}=await sb.from('profiles').select('role,full_name,features').eq('id',session.user.id).single();
    if((prof?.role||'licensee')==='licensee'&&prof?.features?.checker===false){ location.replace('index.html'); throw new Error('no access'); }
    document.getElementById('who').textContent=(prof?.full_name||session.user.email)+' — '+(prof?.role||'licensee');

    const STAGES=[['to_review','To review','#2563eb'],['changes','Changes requested','#475569'],['approved','Approved','#4f46e5']];
    let docs=[], openBiz=null;
    const board=document.getElementById('board');
    const modal=document.getElementById('modal');

    function labelOf(d){ return d.title || ((d.doc_type==='invoice'?'Invoice':'Report')+' — '+d.business_name); }
    function stateOf(biz){
      const all=docs.filter(d=>d.business_name===biz);
      if(all.some(d=>d.status==='pending')) return 'to_review';
      if(all.some(d=>d.status==='rejected')) return 'changes';
      return 'approved';
    }

    async function load(){
      const {data,error}=await sb.from('documents').select('*').order('created_at',{ascending:false});
      if(error){ board.innerHTML='<div class="empty">'+error.message+'</div>'; return; }
      docs=data||[];
      renderBoard();
      if(openBiz && docs.some(d=>d.business_name===openBiz)) renderModal(openBiz); else if(openBiz){ modal.classList.remove('show'); openBiz=null; }
    }

    function renderBoard(){
      const bizNames=[...new Set(docs.map(d=>d.business_name))];
      const np=docs.filter(d=>d.status==='pending').length;
      document.getElementById('tot').textContent=bizNames.length+' business'+(bizNames.length!==1?'es':'')+(np?(' · '+np+' item'+(np!==1?'s':'')+' to review'):'');
      const byStage={to_review:[],changes:[],approved:[]};
      bizNames.forEach(b=>byStage[stateOf(b)].push(b));
      board.innerHTML=STAGES.map(s=>{
        const list=byStage[s[0]].sort((a,b)=>a.localeCompare(b));
        const cards=list.map(bizCard).join('')||'<div class="kempty">—</div>';
        return `<div class="col"><div class="colhead" style="background:${s[2]};color:${s[2]};"><span style="color:#fff;">${s[1]}</span><span class="ct" style="color:#fff;">${list.length}</span></div><div class="colbody">${cards}</div></div>`;
      }).join('');
      board.querySelectorAll('.kcard').forEach(c=>c.addEventListener('click',()=>openReview(c.dataset.biz)));
    }
    function bizCard(biz){
      const items=docs.filter(d=>d.business_name===biz);
      const inv=items.filter(d=>d.doc_type==='invoice').length;
      const rep=items.filter(d=>d.doc_type==='report').length;
      const pending=items.filter(d=>d.status==='pending').length;
      const rejected=items.filter(d=>d.status==='rejected').length;
      const badges=`${inv?`<span class="kb inv">Invoice</span>`:''}${rep?`<span class="kb rep">${rep} report${rep>1?'s':''}</span>`:''}`;
      let stat;
      if(pending>0) stat=`<div class="kstat rev">● ${pending} to review</div>`;
      else if(rejected>0) stat=`<div class="kstat chg">✕ Changes requested (${rejected})</div>`;
      else stat=`<div class="kstat app">✓ All approved</div>`;
      return `<div class="kcard" data-biz="${biz.replace(/"/g,'&quot;')}"><div class="kt">${biz}</div><div class="kbadges">${badges}</div>${stat}</div>`;
    }

    // ---- review modal ----
    function openReview(biz){ openBiz=biz; renderModal(biz); modal.classList.add('show'); }
    document.getElementById('mClose').addEventListener('click',()=>{ modal.classList.remove('show'); openBiz=null; });
    modal.addEventListener('click',e=>{ if(e.target===modal){ modal.classList.remove('show'); openBiz=null; } });

    function docRow(d){
      const label=labelOf(d);
      let inner=`<div class="dr-top"><span class="dr-title">${label}</span><span class="pill ${d.status}">${d.status}</span></div>
        ${d.storage_path?`<a class="dl" href="#" data-path="${d.storage_path}"><b>⬇</b><span>${label}</span></a>`:'<div class="none">No file attached</div>'}`;
      if(d.status==='pending'){
        inner+=`<textarea placeholder="Optional: note any changes you'd like (required if rejecting)…" data-note="${d.id}"></textarea>
          <div class="actions"><button class="approve" data-act="approve" data-id="${d.id}">✓ Approve</button><button class="reject" data-act="reject" data-id="${d.id}">✕ Reject</button></div>
          <div class="msg" id="m-${d.id}"></div>`;
      }else{
        inner+=`${d.licensee_note?`<div class="note-shown"><b>Your note:</b> ${d.licensee_note}</div>`:''}<div class="decided">${d.status==='approved'?'Approved':'Rejected'}${d.decided_at?' · '+new Date(d.decided_at).toLocaleString():''}</div>`;
      }
      return `<div class="docrow">${inner}</div>`;
    }
    function renderModal(biz){
      document.getElementById('mTitle').textContent=biz;
      const items=docs.filter(d=>d.business_name===biz);
      const invoices=items.filter(d=>d.doc_type==='invoice');
      const allReports=items.filter(d=>d.doc_type==='report');
      const reports=allReports.slice(0,4); const extra=allReports.length-reports.length;
      document.getElementById('mBody').innerHTML=`
        <div class="sechead invoice">Invoice <span class="cnt">${invoices.length}</span></div>
        ${invoices.length?invoices.map(docRow).join(''):'<div class="none">No invoice.</div>'}
        <div class="sechead report">Reports <span class="cnt">${allReports.length} of 4</span></div>
        ${reports.length?reports.map(docRow).join(''):'<div class="none">No reports.</div>'}
        ${extra>0?`<div class="none">+ ${extra} more report${extra>1?'s':''} not shown (limit 4).</div>`:''}`;
      const mb=document.getElementById('mBody');
      mb.querySelectorAll('a.dl').forEach(a=>a.addEventListener('click',async e=>{e.preventDefault();
        const {data,error}=await sb.storage.from('documents').createSignedUrl(a.dataset.path,120);
        if(error){ alert(error.message); return; } window.open(data.signedUrl,'_blank');
      }));
      mb.querySelectorAll('button[data-act]').forEach(b=>b.addEventListener('click',()=>decide(b.dataset.id,b.dataset.act,b)));
    }

    async function decide(id,act,btn){
      const note=(document.querySelector(`textarea[data-note="${id}"]`)||{}).value||null;
      const msg=document.getElementById('m-'+id);
      if(act==='reject' && !note){ msg.textContent='Please add a note explaining the rejection.'; msg.className='msg err'; return; }
      btn.disabled=true; msg.textContent='Saving…'; msg.className='msg';
      const {error}=await sb.from('documents').update({status:act==='approve'?'approved':'rejected',licensee_note:note,decided_at:new Date().toISOString()}).eq('id',id);
      if(error){ msg.textContent=error.message; msg.className='msg err'; btn.disabled=false; return; }
      await load();
    }
    load();
  </script>
</body>
</html>
