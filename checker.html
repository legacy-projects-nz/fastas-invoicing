<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FASTAS · Inv/Rep Checker</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%232563eb'/%3E%3Cstop offset='1' stop-color='%237c3aed'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Ctext x='32' y='43' font-family='Arial' font-size='30' font-weight='800' fill='white' text-anchor='middle'%3EFA%3C/text%3E%3C/svg%3E">
<style>
  :root{--ink:#101828;--muted:#667085;--line:#e6e9ef;--brand:#2563eb;--sky:#0ea5e9;--red:#dc2626;--ok:#067647;--amber:#b45309;--bg1:#f7f9fc;--bg2:#eef2f8;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:linear-gradient(160deg,var(--bg1),var(--bg2));min-height:100vh;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-mark{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--sky),var(--brand));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;}
  .topbar a{color:var(--brand);text-decoration:none;font-weight:600;font-size:14px;}
  .topbar .who{font-size:13px;color:var(--muted);}
  .wrap{max-width:880px;margin:0 auto;padding:24px 20px 70px;}
  h1{font-size:26px;margin:4px 0 6px;}
  .sub{color:var(--muted);margin:0 0 18px;font-size:15px;}
  .tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
  .tab{padding:8px 15px;border-radius:999px;border:1px solid var(--line);background:#fff;cursor:pointer;font-weight:600;font-size:14px;color:var(--muted);}
  .tab.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .tab .n{display:inline-block;margin-left:6px;background:var(--red);color:#fff;border-radius:999px;padding:0 7px;font-size:12px;}
  .tab.active .n{background:#fff;color:var(--ink);}

  .biz{background:#fff;border:1px solid var(--line);border-radius:16px;margin-bottom:18px;box-shadow:0 6px 18px rgba(16,24,40,.04);overflow:hidden;}
  .bizhead{padding:14px 18px;background:#f8fafc;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
  /* progress pipeline: Sent → In review → Approved (or Changes needed) */
  .pipe{display:flex;align-items:center;flex-wrap:wrap;}
  .pstep{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:800;color:var(--muted);white-space:nowrap;}
  .pdot{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;background:#cbd5e1;}
  .pstep.done{color:#067647;} .pstep.done .pdot{background:#16a34a;}
  .pstep.active{color:#b45309;} .pstep.active .pdot{background:#d97706;}
  .pstep.alert{color:var(--red);} .pstep.alert .pdot{background:#dc2626;}
  .pbar{width:26px;height:2px;background:#e2e8f0;margin:0 7px;flex:0 0 auto;}
  .pbar.done{background:#16a34a;}
  .bizhead h3{margin:0;font-size:17px;}
  .bizhead .meta{color:var(--muted);font-size:13px;}
  .sec{padding:14px 18px;}
  .sec + .sec{border-top:1px dashed var(--line);}
  .sechead{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
  .sechead.invoice{color:var(--brand);} .sechead.report{color:var(--ok);}
  .sechead .cnt{background:#eef2f8;color:var(--muted);border-radius:999px;padding:1px 8px;font-size:11px;}
  .none{color:var(--muted);font-size:13px;padding:4px 0 8px;}

  .docrow{border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px;}
  .docrow:last-child{margin-bottom:0;}
  .dr-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap;}
  .dr-title{font-weight:700;font-size:15px;}
  .pill{font-size:11px;padding:3px 9px;border-radius:999px;font-weight:700;white-space:nowrap;}
  .pill.pending{background:#fff7ed;color:var(--amber);} .pill.approved{background:#ecfdf3;color:var(--ok);} .pill.rejected{background:#fef2f2;color:var(--red);}
  a.dl{display:inline-flex;align-items:center;gap:6px;color:var(--brand);text-decoration:none;font-weight:600;font-size:14px;margin-top:8px;background:#eff6ff;border:1px solid #dbe7ff;border-radius:9px;padding:8px 12px;max-width:100%;}
  a.dl span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  textarea{width:100%;margin-top:10px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit;resize:vertical;min-height:54px;outline:none;}
  textarea:focus{border-color:var(--brand);}
  .actions{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;}
  button{border:none;border-radius:10px;padding:10px 16px;font-weight:700;font-size:14px;cursor:pointer;}
  button.approve{background:linear-gradient(135deg,#10b981,#059669);color:#fff;}
  button.reject{background:#fff;border:1px solid #f4c4c4;color:var(--red);}
  button:disabled{opacity:.5;cursor:default;}
  .decided{font-size:13px;color:var(--muted);margin-top:8px;}
  .note-shown{margin-top:8px;background:#f8fafc;border:1px solid var(--line);border-radius:10px;padding:9px 11px;font-size:13px;}
  .empty{color:var(--muted);text-align:center;padding:50px 0;}
  .msg{font-size:13px;margin-top:6px;} .msg.ok{color:var(--ok);} .msg.err{color:var(--red);}
</style>
</head>
<body>
  <div class="topbar">
    <div class="brand"><div class="brand-mark">FA</div><b>Inv/Rep Checker</b></div>
    <div style="display:flex;align-items:center;gap:16px;"><span class="who" id="who"></span><a href="index.html">← Main menu</a></div>
  </div>

  <div class="wrap">
    <h1>Invoices &amp; reports to review</h1>
    <p class="sub">Grouped by business — the invoice and its reports are shown separately so it's always clear what you're opening. Add a note if you'd like changes, then approve or reject each item.</p>

    <div class="tabs">
      <div class="tab active" data-f="pending">Pending <span class="n" id="nPending" style="display:none">0</span></div>
      <div class="tab" data-f="approved">Approved</div>
      <div class="tab" data-f="rejected">Rejected</div>
      <div class="tab" data-f="all">All</div>
    </div>

    <div id="host"><div class="empty">Loading…</div></div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    const SUPABASE_URL='https://ecgvkifvlrcfrnqbades.supabase.co';
    const SUPABASE_KEY='sb_publishable_qGgoGsfKwLELehUzbC25Bw_u_rwVwk2';
    const sb=createClient(SUPABASE_URL,SUPABASE_KEY);

    const {data:{session}}=await sb.auth.getSession();
    if(!session){ location.href='index.html'; }
    const {data:prof}=await sb.from('profiles').select('role,full_name').eq('id',session.user.id).single();
    document.getElementById('who').textContent=(prof?.full_name||session.user.email)+' — '+(prof?.role||'licensee');

    let docs=[], filter='pending';
    const host=document.getElementById('host');

    function labelOf(d){ return d.title || ((d.doc_type==='invoice'?'Invoice':'Report')+' — '+d.business_name); }

    // pipeline for a business, computed from ALL its docs (not just the current filter)
    function pipelineFor(biz){
      const all=docs.filter(d=>d.business_name===biz);
      const pending=all.filter(d=>d.status==='pending').length;
      const rejected=all.filter(d=>d.status==='rejected').length;
      const reviewDone=pending===0, ok=reviewDone&&rejected===0, alert=reviewDone&&rejected>0;
      const step=(label,cls,icon)=>`<span class="pstep ${cls}"><span class="pdot">${icon}</span>${label}</span>`;
      return `<div class="pipe">
        ${step('Sent','done','✓')}<span class="pbar done"></span>
        ${reviewDone?step('Reviewed','done','✓'):step('In review · '+pending,'active',pending)}
        <span class="pbar ${reviewDone?'done':''}"></span>
        ${alert?step('Changes needed · '+rejected,'alert','!'):(ok?step('Approved','done','✓'):step('Approval','','…'))}
      </div>`;
    }

    async function load(){
      const {data,error}=await sb.from('documents').select('*').order('created_at',{ascending:false});
      if(error){ host.innerHTML='<div class="empty">'+error.message+'</div>'; return; }
      docs=data||[];
      const np=docs.filter(d=>d.status==='pending').length;
      const nEl=document.getElementById('nPending'); if(np>0){ nEl.textContent=np; nEl.style.display='inline-block'; } else nEl.style.display='none';
      render();
    }

    function docRow(d){
      const label=labelOf(d);
      let inner=`
        <div class="dr-top">
          <span class="dr-title">${label}</span>
          <span class="pill ${d.status}">${d.status}</span>
        </div>
        ${d.storage_path?`<a class="dl" href="#" data-path="${d.storage_path}"><b>⬇</b><span>${label}</span></a>`:'<div class="none">No file attached</div>'}`;
      if(d.status==='pending'){
        inner+=`
          <textarea placeholder="Optional: note any changes you'd like (required if rejecting)…" data-note="${d.id}"></textarea>
          <div class="actions">
            <button class="approve" data-act="approve" data-id="${d.id}">✓ Approve</button>
            <button class="reject" data-act="reject" data-id="${d.id}">✕ Reject</button>
          </div>
          <div class="msg" id="m-${d.id}"></div>`;
      }else{
        inner+=`${d.licensee_note?`<div class="note-shown"><b>Your note:</b> ${d.licensee_note}</div>`:''}
          <div class="decided">${d.status==='approved'?'Approved':'Rejected'}${d.decided_at?' · '+new Date(d.decided_at).toLocaleString():''}</div>`;
      }
      return `<div class="docrow">${inner}</div>`;
    }

    function render(){
      const rows=docs.filter(d=>filter==='all'||d.status===filter);
      if(!rows.length){ host.innerHTML='<div class="empty">Nothing '+(filter==='all'?'here yet':filter)+'.</div>'; return; }
      const groups={};
      rows.forEach(d=>{ (groups[d.business_name]=groups[d.business_name]||[]).push(d); });
      host.innerHTML=Object.entries(groups).map(([biz,items])=>{
        const invoices=items.filter(d=>d.doc_type==='invoice');
        const allReports=items.filter(d=>d.doc_type==='report');
        const reports=allReports.slice(0,4);
        const extra=allReports.length-reports.length;
        return `<div class="biz">
          <div class="bizhead"><h3>${biz}</h3>${pipelineFor(biz)}</div>
          <div class="sec">
            <div class="sechead invoice">Invoice <span class="cnt">${invoices.length}</span></div>
            ${invoices.length?invoices.map(docRow).join(''):'<div class="none">No invoice in this view.</div>'}
          </div>
          <div class="sec">
            <div class="sechead report">Reports <span class="cnt">${allReports.length} of 4</span></div>
            ${reports.length?reports.map(docRow).join(''):'<div class="none">No reports in this view.</div>'}
            ${extra>0?`<div class="none">+ ${extra} more report${extra>1?'s':''} not shown (limit 4).</div>`:''}
          </div>
        </div>`;
      }).join('');
      host.querySelectorAll('a.dl').forEach(a=>a.addEventListener('click',async e=>{e.preventDefault();
        const {data,error}=await sb.storage.from('documents').createSignedUrl(a.dataset.path,120);
        if(error){ alert(error.message); return; } window.open(data.signedUrl,'_blank');
      }));
      host.querySelectorAll('button[data-act]').forEach(b=>b.addEventListener('click',()=>decide(b.dataset.id,b.dataset.act,b)));
    }

    async function decide(id,act,btn){
      const note=(document.querySelector(`textarea[data-note="${id}"]`)||{}).value||null;
      const msg=document.getElementById('m-'+id);
      if(act==='reject' && !note){ msg.textContent='Please add a note explaining the rejection.'; msg.className='msg err'; return; }
      btn.disabled=true; msg.textContent='Saving…'; msg.className='msg';
      const {error}=await sb.from('documents').update({status:act==='approve'?'approved':'rejected',licensee_note:note,decided_at:new Date().toISOString()}).eq('id',id);
      if(error){ msg.textContent=error.message; msg.className='msg err'; btn.disabled=false; return; }
      await load();
    }
    document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{ document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); t.classList.add('active'); filter=t.dataset.f; render(); }));
    load();
  </script>
</body>
</html>
