<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book your FAST AS service</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%232563eb'/%3E%3Cstop offset='1' stop-color='%231d4ed8'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Ctext x='32' y='43' font-family='Arial' font-size='30' font-weight='800' fill='white' text-anchor='middle'%3EFA%3C/text%3E%3C/svg%3E">
<style>
  :root{--ink:#101828;--muted:#667085;--line:#e6e9ef;--brand:#2563eb;--green:#4f46e5;--bg1:#f7f9fc;--bg2:#eef2f8;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:linear-gradient(160deg,var(--bg1),var(--bg2));min-height:100vh;}
  .top{display:flex;align-items:center;gap:10px;padding:18px 20px;background:#fff;border-bottom:1px solid var(--line);}
  .mark{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--brand),#1d4ed8);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;}
  .wrap{max-width:560px;margin:0 auto;padding:22px 16px 60px;}
  h1{font-size:21px;margin:6px 0 4px;}
  .sub{color:var(--muted);font-size:14px;margin:0 0 18px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:0 8px 24px rgba(16,24,40,.05);margin-bottom:14px;}
  label{display:block;font-size:13px;font-weight:700;color:#344054;margin:0 0 8px;}
  .days{display:flex;flex-direction:column;gap:8px;max-height:340px;overflow:auto;}
  .day{display:flex;align-items:center;justify-content:space-between;gap:10px;border:1px solid var(--line);border-radius:11px;padding:10px 13px;}
  .day .dname{font-weight:600;font-size:14px;}
  .slots{display:flex;gap:7px;}
  .slot{border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px 13px;font-size:13px;font-weight:700;cursor:pointer;color:var(--brand);}
  .slot.sel{background:var(--brand);color:#fff;border-color:var(--brand);}
  .slot:disabled{opacity:.3;cursor:default;color:var(--muted);}
  textarea{width:100%;border:1px solid var(--line);border-radius:11px;padding:11px;font-size:14px;font-family:inherit;min-height:60px;}
  button.primary{width:100%;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;border:none;border-radius:12px;padding:14px;font-weight:800;font-size:15px;cursor:pointer;margin-top:6px;}
  button.primary:disabled{opacity:.5;cursor:default;}
  button.call{width:100%;background:#fff;border:1px solid var(--line);color:var(--ink);border-radius:12px;padding:13px;font-weight:700;font-size:14px;cursor:pointer;margin-top:10px;}
  .ok{background:#eef2ff;border:1px solid #c7d2fe;color:#4338ca;border-radius:12px;padding:16px;font-weight:600;}
  .err{color:#475569;font-size:14px;}
  .pick{color:var(--muted);font-size:12px;margin:0 0 10px;}
</style>
</head>
<body>
  <div class="top"><div class="mark">FA</div><b>FAST AS Booking</b></div>
  <div class="wrap" id="wrap"><div class="card"><div class="err">Loading…</div></div></div>

  <script>
    const FN='https://ecgvkifvlrcfrnqbades.supabase.co/functions/v1/booking-respond';
    const KEY='sb_publishable_qGgoGsfKwLELehUzbC25Bw_u_rwVwk2';
    const token=new URLSearchParams(location.search).get('t');
    const wrap=document.getElementById('wrap');
    let state={date:null,ampm:null};

    async function api(action,extra){
      const res=await fetch(FN,{method:'POST',headers:{'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY},body:JSON.stringify(Object.assign({token,action},extra||{}))});
      return res.json();
    }
    function fmtDay(ds){ const d=new Date(ds+'T00:00:00'); return d.toLocaleDateString('en-NZ',{weekday:'short',day:'numeric',month:'short'}); }

    function done(msg){ wrap.innerHTML='<div class="card"><div class="ok">'+msg+'</div></div>'; }

    async function load(){
      if(!token){ wrap.innerHTML='<div class="card"><div class="err">This link is missing its booking code.</div></div>'; return; }
      let d; try{ d=await api('get'); }catch(e){ wrap.innerHTML='<div class="card"><div class="err">Could not load. Please try again later.</div></div>'; return; }
      if(d.error){ wrap.innerHTML='<div class="card"><div class="err">'+d.error+'</div></div>'; return; }
      if(d.status==='responded'){ done('Thanks — we’ve received your preferred time and will confirm shortly.'); return; }
      if(d.status==='call_requested'){ done('Thanks — we’ll give you a call to arrange a time.'); return; }
      if(d.status==='approved'){ done('Your booking is confirmed. See you then!'); return; }
      render(d);
    }

    function render(d){
      const opts=d.options||[];
      let daysHtml;
      if(opts.length){
        daysHtml=opts.map(o=>`<div class="day"><span class="dname">${fmtDay(o.date)}</span><span class="slots">
          <button class="slot" data-date="${o.date}" data-ampm="am" ${o.am?'':'disabled'}>Morning</button>
          <button class="slot" data-date="${o.date}" data-ampm="pm" ${o.pm?'':'disabled'}>Afternoon</button>
        </span></div>`).join('');
      } else {
        daysHtml=`<p class="pick">Pick any preferred date in ${d.monthLabel}:</p>
          <input type="date" id="freeDate" min="${d.monthStart}" style="width:100%;padding:11px;border:1px solid var(--line);border-radius:11px;font-size:15px;margin-bottom:10px;">
          <span class="slots"><button class="slot" data-ampm="am">Morning</button><button class="slot" data-ampm="pm">Afternoon</button></span>`;
      }
      wrap.innerHTML=`
        <h1>Hi ${d.business||'there'}</h1>
        <p class="sub">Your FAST AS service with <b>${d.licensee}</b> is due in <b>${d.monthLabel}</b>. Choose a time that suits, or ask us to call.</p>
        <div class="card">
          <label>Preferred day &amp; time</label>
          <div class="days" id="days">${daysHtml}</div>
          <label style="margin-top:16px;">Anything we should know? (optional)</label>
          <textarea id="note" placeholder="Access notes, best contact number, etc."></textarea>
          <button class="primary" id="submit" disabled>Request this time</button>
          <button class="call" id="call">📞 Just call me instead</button>
        </div>`;
      const days=document.getElementById('days');
      days.querySelectorAll('.slot').forEach(b=>b.addEventListener('click',()=>{
        if(b.disabled) return;
        days.querySelectorAll('.slot').forEach(x=>x.classList.remove('sel'));
        b.classList.add('sel');
        const fd=document.getElementById('freeDate');
        state.date=b.dataset.date || (fd&&fd.value) || null;
        state.ampm=b.dataset.ampm;
        document.getElementById('submit').disabled=!(state.date&&state.ampm);
      }));
      const fd=document.getElementById('freeDate');
      if(fd) fd.addEventListener('change',()=>{ const sel=days.querySelector('.slot.sel'); state.date=fd.value; state.ampm=sel?sel.dataset.ampm:null; document.getElementById('submit').disabled=!(state.date&&state.ampm); });
      document.getElementById('submit').addEventListener('click',async()=>{
        const btn=document.getElementById('submit'); btn.disabled=true; btn.textContent='Sending…';
        const r=await api('submit',{date:state.date,ampm:state.ampm,note:document.getElementById('note').value});
        if(r.error){ btn.disabled=false; btn.textContent='Request this time'; alert(r.error); return; }
        done('Thanks — we’ve received your preferred time ('+fmtDay(state.date)+', '+(state.ampm==='am'?'morning':'afternoon')+') and will confirm shortly.');
      });
      document.getElementById('call').addEventListener('click',async()=>{
        const r=await api('call',{note:document.getElementById('note').value});
        if(r.error){ alert(r.error); return; }
        done('Thanks — we’ll give you a call to arrange a time.');
      });
    }
    load();
  </script>
</body>
</html>
