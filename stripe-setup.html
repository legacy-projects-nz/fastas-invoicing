<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FASTAS · Set up Direct Debit</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%232563eb'/%3E%3Ctext x='32' y='43' font-family='Arial' font-size='30' font-weight='800' fill='white' text-anchor='middle'%3EFA%3C/text%3E%3C/svg%3E">
<script src="https://js.stripe.com/v3/"></script>
<style>
  :root{--ink:#101828;--muted:#667085;--line:#e6e9ef;--brand:#2563eb;--ok:#16a34a;--red:#b91c1c;--bg1:#f7f9fc;--bg2:#eef2f8;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:linear-gradient(160deg,var(--bg1),var(--bg2));min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:32px 18px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:26px;max-width:480px;width:100%;box-shadow:0 12px 34px rgba(16,24,40,.1);}
  .brand-mark{width:46px;height:46px;border-radius:12px;background:linear-gradient(135deg,var(--brand),#1d4ed8);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:18px;margin-bottom:14px;}
  h1{font-size:21px;margin:0 0 6px;}
  p.sub{color:var(--muted);font-size:13.5px;margin:0 0 18px;line-height:1.5;}
  #pe{margin:10px 0 14px;}
  button{width:100%;padding:13px;font-size:16px;font-weight:700;color:#fff;border:none;border-radius:12px;cursor:pointer;background:linear-gradient(135deg,#2563eb,#1d4ed8);}
  button:disabled{opacity:.5;cursor:default;}
  .msg{font-size:13.5px;margin-top:12px;min-height:18px;}
  .msg.err{color:var(--red);} .msg.ok{color:var(--ok);font-weight:600;}
  .done{text-align:center;padding:14px 0;}
  .done .tick{font-size:42px;color:var(--ok);}
  a{color:var(--brand);}
</style>
</head>
<body>
  <div class="card">
    <div class="brand-mark">FA</div>
    <h1>Set up Direct Debit</h1>
    <p class="sub">Authorise FAST AS to collect your weekly invoice charges directly from your New Zealand bank account. Your bank details go straight to Stripe — they're never stored by FAST AS.</p>
    <div id="loading" class="msg">Loading…</div>
    <form id="payform" style="display:none;">
      <div id="pe"></div>
      <button id="submit" type="submit">Authorise Direct Debit</button>
    </form>
    <div id="done" class="done" style="display:none;"><div class="tick">✓</div><p class="msg ok">Direct debit authorised. You're all set — nothing else to do.</p></div>
    <div class="msg" id="msg"></div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.106.2/+esm';
    const SUPABASE_URL='https://ecgvkifvlrcfrnqbades.supabase.co';
    const SUPABASE_KEY='sb_publishable_qGgoGsfKwLELehUzbC25Bw_u_rwVwk2';
    const STRIPE_PK='pk_test_51QpF4NCYhcFhqi4OEVex85F3fBucSZvt9MQXOAmS3rJZhbUGMffX4kWFNf2Sdk2gc0AYxz4dPXWPbjGKOWh2t1fK008GQvyBj1';
    const sb=createClient(SUPABASE_URL,SUPABASE_KEY);
    const msg=document.getElementById('msg'), loading=document.getElementById('loading');
    function err(t){ msg.textContent=t; msg.className='msg err'; }

    const {data:{session}}=await sb.auth.getSession();
    if(!session){ location.replace('index.html'); throw new Error('not signed in'); }

    let stripe, elements;
    try{
      const r=await fetch(SUPABASE_URL+'/functions/v1/stripe-setup',{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+session.access_token},body:'{}'});
      const o=await r.json(); if(!r.ok||o.error) throw new Error(o.error||'Could not start setup.');
      stripe=Stripe(STRIPE_PK);
      elements=stripe.elements({clientSecret:o.client_secret});
      const pe=elements.create('payment');
      pe.mount('#pe');
      loading.style.display='none';
      document.getElementById('payform').style.display='block';
    }catch(e){ loading.style.display='none'; err(e.message); }

    document.getElementById('payform').addEventListener('submit',async(e)=>{
      e.preventDefault(); const btn=document.getElementById('submit'); btn.disabled=true; msg.textContent='Authorising…'; msg.className='msg';
      const {error}=await stripe.confirmSetup({elements,confirmParams:{return_url:location.href.split('#')[0]},redirect:'if_required'});
      if(error){ err(error.message||'Could not authorise.'); btn.disabled=false; return; }
      document.getElementById('payform').style.display='none';
      document.getElementById('done').style.display='block'; msg.textContent='';
    });
  </script>
</body>
</html>
