<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FASTAS · Pricing & items</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%232563eb'/%3E%3Cstop offset='1' stop-color='%237c3aed'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Ctext x='32' y='43' font-family='Arial' font-size='30' font-weight='800' fill='white' text-anchor='middle'%3EFA%3C/text%3E%3C/svg%3E">
<style>
  :root{--ink:#101828;--muted:#667085;--line:#e6e9ef;--brand:#2563eb;--amber:#d97706;--red:#dc2626;--bg1:#f7f9fc;--bg2:#eef2f8;--ok:#067647;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:linear-gradient(160deg,var(--bg1),var(--bg2));min-height:100vh;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-mark{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--brand),#7c3aed);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;}
  .brand b{font-size:17px;}
  .topbar a{color:var(--brand);text-decoration:none;font-weight:600;font-size:14px;}
  .topbar .who{font-size:13px;color:var(--muted);}
  .wrap{max-width:1000px;margin:0 auto;padding:26px 20px 60px;}
  h1{font-size:28px;margin:6px 0 4px;}
  .sub{color:var(--muted);margin:0 0 18px;font-size:15px;}
  .ownerbar{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:16px;}
  .ownerbar.hidden{display:none;}
  .ownerbar label{font-size:13px;font-weight:700;color:#344054;}
  .ownerbar select{padding:9px 12px;border:1px solid var(--line);border-radius:9px;font-size:14px;min-width:240px;}
  .toolbar{display:flex;gap:12px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
  .toolbar input[type=search]{flex:1 1 220px;padding:11px 14px;border:1px solid var(--line);border-radius:10px;font-size:15px;outline:none;}
  .toolbar input:focus{border-color:var(--brand);}
  .savebar{position:sticky;bottom:0;background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 -6px 20px rgba(16,24,40,.06);margin-top:18px;}
  .savebar.hidden{display:none;}
  button.primary{background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;border:none;border-radius:10px;padding:11px 20px;font-weight:700;font-size:15px;cursor:pointer;}
  button.primary:disabled{opacity:.5;cursor:default;}
  button.ghost{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 16px;cursor:pointer;font-size:14px;}
  table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;}
  th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line);font-size:14px;vertical-align:middle;}
  th{background:#f8fafc;font-size:12px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);}
  tr:last-child td{border-bottom:none;}
  td.code{font-family:ui-monospace,Menlo,monospace;font-weight:600;white-space:nowrap;}
  input.name{width:100%;min-width:160px;padding:8px 10px;border:1px solid transparent;border-radius:8px;font-size:14px;background:transparent;}
  input.name:hover{border-color:var(--line);}
  input.name:focus{border-color:var(--amber);background:#fff;outline:none;box-shadow:0 0 0 3px rgba(217,119,6,.12);}
  input.price{width:96px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:14px;text-align:right;outline:none;}
  input.price:focus{border-color:var(--amber);box-shadow:0 0 0 3px rgba(217,119,6,.15);}
  select.status{padding:7px 8px;border:1px solid var(--line);border-radius:8px;font-size:13px;}
  tr.changed{background:#fffbeb;}
  tr.del{background:#fef2f2;text-decoration:line-through;opacity:.6;}
  button.rm{background:#fff;border:1px solid #f4c4c4;color:var(--red);border-radius:8px;padding:6px 10px;cursor:pointer;font-size:13px;}
  button.undo{background:#fff;border:1px solid var(--line);border-radius:8px;padding:6px 10px;cursor:pointer;font-size:13px;}
  .msg{font-size:14px;} .msg.ok{color:var(--ok);} .msg.err{color:#d92d20;}
  .loading{padding:40px;text-align:center;color:var(--muted);}
  .additem{display:none;background:#fff;border:1px dashed #c9d2e3;border-radius:12px;padding:14px;margin-bottom:14px;gap:10px;align-items:end;flex-wrap:wrap;}
  .additem.show{display:flex;}
  .additem .f{display:flex;flex-direction:column;gap:5px;} .additem label{font-size:12px;font-weight:600;color:#344054;}
  .additem input{padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:14px;}
  @media(max-width:620px){ th:nth-child(3),td:nth-child(3){display:none;} }
</style>
</head>
<body>
  <div class="topbar">
    <div class="brand"><div class="brand-mark">FA</div><b>Pricing &amp; items</b></div>
    <div style="display:flex;align-items:center;gap:16px;"><span class="who" id="who"></span><a href="index.html">← Main menu</a></div>
  </div>

  <div class="wrap">
    <h1>Items &amp; pricing</h1>
    <p class="sub" id="sub">Add, edit or remove items and prices. This list is the single source of truth — it feeds the invoice flow.</p>

    <div class="ownerbar hidden" id="ownerbar">
      <label>Editing list for:</label>
      <select id="ownerSel"></select>
    </div>

    <div class="toolbar">
      <input type="search" id="search" placeholder="Search by code or name…">
      <button class="ghost" id="toggleInactive">Show inactive</button>
      <button class="primary" id="toggleAdd" style="margin-left:auto;">+ Add item</button>
    </div>

    <div class="additem" id="additem">
      <div class="f"><label>Item code *</label><input id="aiCode" placeholder="e.g. FEC - Testing"></div>
      <div class="f" style="flex:1 1 220px;"><label>Description *</label><input id="aiName" placeholder="Fire Extinguisher Certification" style="width:100%"></div>
      <div class="f"><label>Price (NZD)</label><input id="aiPrice" type="number" step="0.01" min="0" value="0" style="width:110px"></div>
      <button class="primary" id="aiSave">Add</button>
      <button class="ghost" id="aiCancel">Cancel</button>
      <span class="msg" id="aiMsg"></span>
    </div>

    <div id="tableHost"><div class="loading">Loading…</div></div>

    <div class="savebar hidden" id="savebar">
      <span class="msg" id="saveMsg"><b id="changeCount">0</b> unsaved change(s)</span>
      <span style="display:flex;gap:10px;">
        <button class="ghost" id="discard">Discard</button>
        <button class="primary" id="save">Save changes</button>
      </span>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    const SUPABASE_URL='https://ecgvkifvlrcfrnqbades.supabase.co';
    const SUPABASE_KEY='sb_publishable_qGgoGsfKwLELehUzbC25Bw_u_rwVwk2';
    const sb=createClient(SUPABASE_URL,SUPABASE_KEY);

    const {data:{session}}=await sb.auth.getSession();
    if(!session){ location.href='index.html'; }
    const {data:prof}=await sb.from('profiles').select('role,full_name').eq('id',session.user.id).single();
    const role=prof?.role||'licensee';
    document.getElementById('who').textContent=(prof?.full_name||session.user.email)+' — '+role;

    let items=[], showInactive=false, ownerId=session.user.id;
    const edits={};      // id -> {item_name?, unit_price?, status?}
    const dels=new Set(); // ids marked for delete
    const host=document.getElementById('tableHost');
    const search=document.getElementById('search');
    const savebar=document.getElementById('savebar');
    const changeCount=document.getElementById('changeCount');
    const saveMsg=document.getElementById('saveMsg');

    if(role==='admin'){
      document.getElementById('ownerbar').classList.remove('hidden');
      document.getElementById('sub').textContent='Pick a licensee, then add / edit / remove their items and prices.';
      const {data:licensees}=await sb.from('profiles').select('id,email,full_name').eq('role','licensee').order('email');
      const sel=document.getElementById('ownerSel');
      sel.innerHTML=(licensees||[]).map(l=>`<option value="${l.id}">${l.full_name||l.email} (${l.email})</option>`).join('') || '<option value="">No licensees yet</option>';
      ownerId=licensees&&licensees.length?licensees[0].id:'';
      sel.addEventListener('change',()=>{ ownerId=sel.value; resetPending(); load(); });
    }

    function resetPending(){ for(const k in edits) delete edits[k]; dels.clear(); refreshSaveBar(); }

    async function load(){
      if(!ownerId){ host.innerHTML='<div class="loading">No licensee selected.</div>'; return; }
      let q=sb.from('pricing_items').select('*').order('sort_order');
      if(role==='admin') q=q.eq('owner_id',ownerId);
      const {data,error}=await q;
      if(error){ host.innerHTML='<div class="loading">Error: '+error.message+'</div>'; return; }
      items=data; render();
    }

    function cur(it,field){ return (edits[it.id] && edits[it.id][field]!==undefined) ? edits[it.id][field] : it[field]; }
    function setEdit(it,field,val){
      const orig=it[field];
      edits[it.id]=edits[it.id]||{};
      if(String(val)===String(orig)){ delete edits[it.id][field]; if(!Object.keys(edits[it.id]).length) delete edits[it.id]; }
      else edits[it.id][field]=val;
      refreshSaveBar();
    }

    function render(){
      const q=(search.value||'').toLowerCase();
      const rows=items.filter(it=>(showInactive||cur(it,'status')==='active'||dels.has(it.id)))
        .filter(it=>!q||it.item_code.toLowerCase().includes(q)||String(cur(it,'item_name')).toLowerCase().includes(q));
      if(!rows.length){ host.innerHTML='<div class="loading">No items yet — use “+ Add item”.</div>'; return; }
      let html='<table><thead><tr><th>Code</th><th>Description</th><th>Status</th><th style="text-align:right">Unit price (NZD)</th><th></th></tr></thead><tbody>';
      for(const it of rows){
        const isDel=dels.has(it.id);
        const changed=!!edits[it.id];
        html+=`<tr class="${isDel?'del':(changed?'changed':'')}" data-id="${it.id}">
          <td class="code">${it.item_code}</td>
          <td><input class="name" data-id="${it.id}" value="${String(cur(it,'item_name')).replace(/"/g,'&quot;')}" ${isDel?'disabled':''}></td>
          <td><select class="status" data-id="${it.id}" ${isDel?'disabled':''}><option value="active"${cur(it,'status')==='active'?' selected':''}>Active</option><option value="inactive"${cur(it,'status')!=='active'?' selected':''}>Inactive</option></select></td>
          <td><div style="display:flex;align-items:center;gap:4px;justify-content:flex-end"><span style="color:#667085">$</span><input class="price" type="number" step="0.01" min="0" value="${Number(cur(it,'unit_price')).toFixed(2)}" data-id="${it.id}" ${isDel?'disabled':''}></div></td>
          <td style="text-align:right">${isDel?`<button class="undo" data-id="${it.id}">Undo</button>`:`<button class="rm" data-id="${it.id}">Delete</button>`}</td>
        </tr>`;
      }
      host.innerHTML=html+'</tbody></table>';
      host.querySelectorAll('input.name').forEach(i=>i.addEventListener('input',()=>setEdit(items.find(x=>x.id===i.dataset.id),'item_name',i.value)));
      host.querySelectorAll('input.price').forEach(i=>i.addEventListener('input',()=>{ setEdit(items.find(x=>x.id===i.dataset.id),'unit_price',i.value); i.closest('tr').classList.toggle('changed',!!edits[i.dataset.id]); }));
      host.querySelectorAll('select.status').forEach(s=>s.addEventListener('change',()=>setEdit(items.find(x=>x.id===s.dataset.id),'status',s.value)));
      host.querySelectorAll('button.rm').forEach(b=>b.addEventListener('click',()=>{ dels.add(b.dataset.id); delete edits[b.dataset.id]; render(); refreshSaveBar(); }));
      host.querySelectorAll('button.undo').forEach(b=>b.addEventListener('click',()=>{ dels.delete(b.dataset.id); render(); refreshSaveBar(); }));
    }
    function refreshSaveBar(){
      const n=Object.keys(edits).length+dels.size;
      changeCount.textContent=n; saveMsg.innerHTML=`<b>${n}</b> unsaved change(s)`; saveMsg.className='msg';
      savebar.classList.toggle('hidden', n===0);
    }

    search.addEventListener('input',render);
    document.getElementById('toggleInactive').addEventListener('click',(e)=>{ showInactive=!showInactive; e.target.textContent=showInactive?'Hide inactive':'Show inactive'; render(); });
    document.getElementById('discard').addEventListener('click',()=>{ resetPending(); render(); });

    document.getElementById('save').addEventListener('click',async()=>{
      const btn=document.getElementById('save'); btn.disabled=true; saveMsg.textContent='Saving…'; saveMsg.className='msg';
      try{
        for(const [id,fields] of Object.entries(edits)){
          if(dels.has(id)) continue;
          const payload={}; if(fields.item_name!==undefined)payload.item_name=fields.item_name; if(fields.unit_price!==undefined)payload.unit_price=Number(fields.unit_price); if(fields.status!==undefined)payload.status=fields.status;
          const {error}=await sb.from('pricing_items').update(payload).eq('id',id); if(error) throw error;
        }
        for(const id of dels){ const {error}=await sb.from('pricing_items').delete().eq('id',id); if(error) throw error; }
        resetPending(); await load();
        saveMsg.textContent='Saved ✓'; saveMsg.className='msg ok'; savebar.classList.remove('hidden');
        setTimeout(()=>savebar.classList.add('hidden'),1500);
      }catch(err){ saveMsg.textContent='Error: '+err.message; saveMsg.className='msg err'; }
      btn.disabled=false;
    });

    // add item (all roles, scoped to current ownerId)
    const additem=document.getElementById('additem');
    document.getElementById('toggleAdd').addEventListener('click',()=>additem.classList.toggle('show'));
    document.getElementById('aiCancel').addEventListener('click',()=>additem.classList.remove('show'));
    document.getElementById('aiSave').addEventListener('click',async()=>{
      const msg=document.getElementById('aiMsg'); msg.textContent='';
      const code=document.getElementById('aiCode').value.trim();
      const name=document.getElementById('aiName').value.trim();
      const price=Number(document.getElementById('aiPrice').value||0);
      if(!code||!name){ msg.textContent='Code and description required.'; msg.className='msg err'; return; }
      if(!ownerId){ msg.textContent='No licensee selected.'; msg.className='msg err'; return; }
      const sort=(items.reduce((m,i)=>Math.max(m,i.sort_order||0),0))+10;
      const {error}=await sb.from('pricing_items').insert({item_code:code,item_name:name,unit_price:price,owner_id:ownerId,sort_order:sort,status:'active'});
      if(error){ msg.textContent=error.message; msg.className='msg err'; return; }
      document.getElementById('aiCode').value=document.getElementById('aiName').value=''; document.getElementById('aiPrice').value='0';
      msg.textContent='Added ✓'; msg.className='msg ok'; load();
    });

    load();
  </script>
</body>
</html>
